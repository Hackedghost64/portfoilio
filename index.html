<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Divyam | Systems & Automation Developer</title>
    <meta name="description" content="Engineering scalable, OOP-driven applications and mobile-first web architectures.">
    <meta name="keywords" content="Portfolio, Software Engineer, Divyam Gupta, Systems, Automation, OOP, Web Architecture">
    <meta name="robots" content="index, follow">
    <link rel="canonical" href="https://hackedghost64.github.io/portfoilio/">
    
    <!-- Open Graph for SEO -->
    <meta property="og:title" content="Divyam | Systems & Automation Developer">
    <meta property="og:description" content="Engineering scalable, OOP-driven applications and mobile-first web architectures.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://hackedghost64.github.io/portfoilio/">
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
    
    <!-- Global CSS -->
    <link rel="stylesheet" href="css/global.css">
    
    <!-- App Entry: Zero-Dependency Bundle -->
    <script src="js/bundle.js"></script>
</head>
<body>
    <script>
        // High-Visibility Fatal Error Catcher
        window.addEventListener('error', (e) => {
            const overlay = document.createElement('div');
            overlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;background:#93000a;color:#ffdad6;padding:20px;z-index:999999;font-family:monospace;border-bottom:5px solid #ffb4ab;';
            overlay.innerHTML = `<b>FATAL ARCHITECTURAL ERROR:</b><br>${e.message}<br><small>${e.filename}:${e.lineno}</small>`;
            document.body.prepend(overlay);
        });
    </script>
    
    <header>
        <portfolio-nav></portfolio-nav>
    </header>

    <main>
        <portfolio-hero id="home"></portfolio-hero>
        
        <section id="about" style="scroll-margin-top: 80px;">
            <portfolio-about></portfolio-about>
        </section>

        <section id="projects" style="scroll-margin-top: 80px;">
            <portfolio-projects></portfolio-projects>
        </section>

        <section id="tech" style="scroll-margin-top: 80px;">
            <portfolio-tech></portfolio-tech>
        </section>
    </main>

    <footer style="padding: 40px var(--gutter); text-align: center; border-top: 1px solid rgba(140, 144, 159, 0.1); opacity: 0.6; max-width: var(--container-max); margin: 0 auto;">
        <p>&copy; 2026 Divyam Gupta. Engineered for Scale.</p>
    </footer>

    <script>
        // Global Error Handling for Trace Debugging
        window.addEventListener('error', (e) => {
            console.error('[Global Error]', e.message, 'at', e.filename, ':', e.lineno);
        });
    </script>
</body>
</html>
